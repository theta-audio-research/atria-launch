<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THETA | Font Research Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Montserrat:wght@700&family=Inter:wght@700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #040406; color: #fff; padding: 100px; text-align: center; }
        .option { margin-bottom: 80px; padding-bottom: 40px; border-bottom: 1px solid #1A1B23; }
        .label { color: #C8A86B; font-size: 10px; letter-spacing: 4px; margin-bottom: 20px; font-family: sans-serif; }
        
        /* The CSS for each style */
        .style-1 { font-family: 'JetBrains Mono'; letter-spacing: 12px; text-transform: uppercase; }
        .style-2 { font-family: 'Montserrat'; letter-spacing: 22px; text-transform: uppercase; }
        .style-3 { font-family: 'Inter'; letter-spacing: 10px; text-transform: uppercase; }
        .style-4 { font-family: 'Space Mono'; letter-spacing: 14px; text-transform: uppercase; }
        
        h1 { font-size: 60px; margin: 0; }
    </style>
</head>
<body>

    <div class="option">
        <div class="label">OPTION 1: THE ENGINEER (JETBRAINS MONO)</div>
        <h1 class="style-1">ATRIA</h1>
    </div>

    <div class="option">
        <div class="label">OPTION 2: THE INSTITUTION (MONTSERRAT)</div>
        <h1 class="style-2">ATRIA</h1>
    </div>

    <div class="option">
        <div class="label">OPTION 3: THE SCHOLAR (INTER)</div>
        <h1 class="style-3">ATRIA</h1>
    </div>

    <div class="option">
        <div class="label">OPTION 4: THE BOUTIQUE (SPACE MONO)</div>
        <h1 class="style-4">ATRIA</h1>
    </div>

</body>
</html>
