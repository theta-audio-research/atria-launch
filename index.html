<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THETA | Laboratory Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --void: #000000; 
            --gold: #C8A86B; 
            --silver: #B0B0B0; 
            --border: #1A1B23; 
        }
        
        body { 
            background-color: var(--void); 
            color: var(--silver); 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
        }

        /* --- STICKY NAVIGATION --- */
        nav.nav-terminal {
            padding: 10px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--void);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo-link { 
            height: 70px; 
            display: flex;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.2, 0.6, 0.2, 1);
            backface-visibility: hidden;
            -webkit-font-smoothing: subpixel-antialiased;
        }
        
        .header-logo-link:hover { 
            transform: scale(1.08);
        }
        
        .header-logo-link img { 
            height: 100%; 
            width: auto; 
            display: block;
        }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { 
            color: var(--gold); 
            text-decoration: none; 
            font-size: 10px; 
            letter-spacing: 4px; 
            font-weight: 700; 
            border: 1px solid var(--border); 
            padding: 10px 20px; 
            transition: 0.3s; 
            text-transform: uppercase;
        }
        .nav-links a:hover { background: var(--gold); color: var(--void); }

        /* --- HERO SECTION (Compressed) --- */
        header.hero-section { 
            /* Top padding reduced from 100px to 20px */
            padding: 20px 60px 40px 60px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            background: var(--void);
            border-bottom: 1px solid var(--border);
        }

        .hero-logo-container {
            width: 100%;
            max-width: 800px; 
            transition: transform 0.8s cubic-bezier(0.2, 0.6, 0.2, 1);
            backface-visibility: hidden;
        }
        
        .hero-logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .hero-logo-container:hover {
            transform: scale(1.03);
        }

        /* --- MODULE LIST --- */
        main { 
            flex: 1; 
            padding: 60px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            background: var(--void);
        }
        
        .node-row { 
            display: flex; 
            align-items: center; 
            text-decoration: none; 
            color: inherit; 
            padding: 25px 40px; 
            width: 100%;
            max-width: 900px;
            border-bottom: 1px solid rgba(26, 27, 35, 0.5); 
            transition: 0.4s;
        }

        .node-row:hover { 
            background: rgba(200, 168, 107, 0.03);
            border-bottom: 1px solid var(--gold); 
            transform: translateX(30px); 
        }
        
        .node-id { font-size: 10px; color: var(--gold); width: 100px; font-weight: 700; opacity: 0.5; }
        .node-name { 
            font-family: 'Montserrat'; 
            font-size: 38px; 
            letter-spacing: 16px; 
            color: #fff; 
            text-transform: uppercase; 
            flex: 1;
        }
        .node-desc { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.4; text-align: right; }
        
        .node-row:hover .node-name { color: var(--gold); }

        footer { 
            padding: 40px 60px; 
            font-size: 9px; 
            letter-spacing: 6px; 
            opacity: 0.3; 
            display: flex; 
            justify-content: space-between; 
            border-top: 1px solid var(--border); 
            background: var(--void);
        }

        @media (max-width: 1100px) {
            .node-name { font-size: 24px; letter-spacing: 8px; }
            .hero-logo-container { max-width: 90%; }
            nav.nav-terminal { padding: 20px; flex-direction: column; gap: 20px; }
            header.hero-section { padding: 20px 20px 40px 20px; }
        }
    </style>
</head>
<body>

<nav class="nav-terminal">
    <a href="index.html" class="header-logo-link">
        <img src="theta_logo_square_black.png" alt="THETA Insignia">
    </a>
    <div class="nav-links">
        <a href="store.html">STORE</a>
        <a href="support.html">SUPPORT</a>
    </div>
</nav>

<header class="hero-section">
    <div class="hero-logo-container">
        <img src="theta_logo_horizontal_black.png" alt="THETA Audio Research">
    </div>
</header>

<main>
    <a href="arecibo.html" class="node-row">
        <span class="node-id">001_ISR</span>
        <span class="node-name">ARECIBO</span>
        <span class="node-desc">Interstellar Granular Processor</span>
    </a>
    <a href="atria.html" class="node-row">
        <span class="node-id">002_ARC</span>
        <span class="node-name">ATRIA</span>
        <span class="node-desc">Sonic Exploration Instrument</span>
    </a>
    <a href="cathode.html" class="node-row">
        <span class="node-id">003_VTR</span>
        <span class="node-name">CATHODE</span>
        <span class="node-desc">Character & Degradation Engine</span>
    </a>
    <a href="erosion.html" class="node-row">
        <span class="node-id">004_DEG</span>
        <span class="node-name">EROSION</span>
        <span class="node-desc">Four-Stage Saturation Engine</span>
    </a>
    <a href="twilight.html" class="node-row">
        <span class="node-id">005_GEN</span>
        <span class="node-name">TWILIGHT</span>
        <span class="node-desc">Regenerative Ambience Engine</span>
    </a>
</main>

<footer>
    <span>SYSTEM_STABLE // 2026</span>
    <span>LABORATORY_ACCESS_GRANTED</span>
</footer>

</body>
</html>
