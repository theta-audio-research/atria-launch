<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THETA | Laboratory Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --void: #020204; --gold: #C8A86B; --text: #B0B0B0; --border: #121320; }
        body { background-color: var(--void); color: var(--text); font-family: 'JetBrains Mono', monospace; margin: 0; overflow-x: hidden; }

        /* MINIMAL TOP NAV */
        nav { padding: 30px 5%; display: flex; justify-content: flex-end; }
        nav a { color: var(--gold); text-decoration: none; font-size: 10px; letter-spacing: 3px; opacity: 0.5; transition: 0.3s; }
        nav a:hover { opacity: 1; }

        /* CENTERED LOGO STAGE */
        .hero-stage { text-align: center; padding: 60px 0; }
        .main-logo { width: 120px; height: auto; filter: drop-shadow(0 0 30px rgba(200, 168, 107, 0.1)); }

        /* ENGINE DIRECTORY GRID */
        .directory-grid { 
            max-width: 1000px; 
            margin: 0 auto 100px auto; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 2px; /* Thin border-look lines */
            background-color: var(--border);
            border: 1px solid var(--border);
        }
        
        .node { 
            background-color: var(--void); 
            padding: 60px 40px; 
            text-decoration: none; 
            text-align: center;
            transition: 0.4s;
        }
        
        .node:hover { background-color: rgba(200, 168, 107, 0.03); }
        .node h2 { font-family: 'Montserrat', sans-serif; font-size: 22px; letter-spacing: 12px; color: #fff; margin: 0; text-transform: uppercase; }
        .node p { font-size: 9px; letter-spacing: 4px; color: var(--gold); margin-top: 15px; opacity: 0.6; text-transform: uppercase; }

        footer { padding: 60px 5%; text-align: center; font-size: 9px; opacity: 0.2; letter-spacing: 5px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<nav>
    <a href="support.html">SUPPORT_CONTACT</a>
</nav>

<div class="hero-stage">
    <svg class="main-logo" viewBox="0 0 100 100">
        <path d="M50 15 L85 85 L15 85 Z" fill="none" stroke="#C8A86B" stroke-width="3.5"/>
        <path d="M42 35 L15 85 L85 85 L58 35" fill="#020204"/>
        <rect x="15" y="58" width="70" height="10" fill="#C8A86B"/>
    </svg>
</div>

<main class="directory-grid">
    <a href="atria.html" class="node">
        <h2>ATRIA</h2>
        <p>Exploration</p>
    </a>
    <a href="twilight.html" class="node">
        <h2>TWILIGHT</h2>
        <p>Ambience</p>
    </a>
    <a href="erosion.html" class="node">
        <h2>EROSION</h2>
        <p>Degeneration</p>
    </a>
    <a href="cathode.html" class="node">
        <h2>CATHODE</h2>
        <p>Analog</p>
    </a>
</main>

<footer>
    © 2026 THETA AUDIO RESEARCH // LAB_INDEX_v2.1
</footer>

</body>
</html>
