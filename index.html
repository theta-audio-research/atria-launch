<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THETA | Laboratory Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --void: #06080C; --gold: #C8A86B; --silver: #B0B0B0; --border: #1A1B23; }
        
        body { 
            background-color: var(--void); 
            color: var(--silver); 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
        }

        /* --- STICKY NAVIGATION TERMINAL --- */
        nav.nav-terminal {
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            /* Standard laboratory translucent blend */
            background: rgba(6, 8, 12, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand-link { height: 35px; transition: 0.4s; }
        
        /* Gold drop-shadow on hover for the header logo */
        .header-brand-link:hover { filter: drop-shadow(0 0 15px rgba(200, 168, 107, 0.4)); }
        
        .header-brand-link img { 
            height: 100%; 
            width: auto; 
            display: block;
            /* Ensures white background is removed in flattened PNGs for this context */
            background: transparent;
        }

        .nav-links { display: flex; gap: 20px; }
        .nav-links a { 
            color: var(--gold); 
            text-decoration: none; 
            font-size: 10px; 
            letter-spacing: 4px; 
            font-weight: 700; 
            border: 1px solid var(--border); 
            padding: 10px 20px; 
            transition: 0.3s; 
            text-transform: uppercase;
        }
        .nav-links a:hover { background: var(--gold); color: var(--void); }

        /* --- HERO BRANDING SECTION --- */
        header.hero-section { 
            padding: 120px 60px 80px 60px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .hero-logo-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            transition: 0.8s cubic-bezier(0.2, 0.6, 0.2, 1);
        }
        
        /* The main logo is on a transparent background */
        .hero-logo-container img {
            width: 100%;
            height: auto;
            /* Clinical Gold/Ember drop-shadow */
            filter: drop-shadow(0 0 30px rgba(255, 87, 34, 0.15));
        }
        
        .hero-logo-container:hover {
            transform: scale(1.02);
            /* Amber/Ember "Seize" effect on hover */
            filter: drop-shadow(0 0 50px rgba(255, 87, 34, 0.3));
        }

        /* --- MODULE LIST --- */
        main { 
            flex: 1; 
            padding: 60px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
        }
        
        .node-row { 
            display: flex; 
            align-items: center; 
            text-decoration: none; 
            color: inherit; 
            padding: 25px 40px; 
            width: 100%;
            max-width: 900px;
            border-bottom: 1px solid rgba(26, 27, 35, 0.5); 
            transition: transform 0.4s cubic-bezier(0.2, 0.6, 0.2, 1), background 0.4s, border-color 0.4s;
            transform: translateX(0);
        }

        .node-row:hover { 
            background: rgba(200, 168, 107, 0.03);
            border-bottom: 1px solid var(--gold); 
            transform: translateX(30px); 
        }
        
        .node-id { font-size: 10px; color: var(--gold); width: 100px; font-weight: 700; opacity: 0.5; }
        .node-name { 
            font-family: 'Montserrat'; 
            font-size: 38px; 
            letter-spacing: 16px; 
            color: #fff; 
            text-transform: uppercase; 
            flex: 1;
            transition: color 0.4s;
        }
        .node-desc { 
            font-size: 10px; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            opacity: 0.4; 
            text-align: right; 
        }
        
        .node-row:hover .node-name { color: var(--gold); }

        footer { 
            padding: 40px 60px; 
            font-size: 9px; 
            letter-spacing: 6px; 
            opacity: 0.3; 
            display: flex; 
            justify-content: space-between; 
            border-top: 1px solid var(--border); 
        }

        @media (max-width: 1100px) {
            .node-name { font-size: 24px; letter-spacing: 8px; }
            .hero-logo-container { max-width: 350px; }
            nav.nav-terminal { flex-direction: column; gap: 20px; }
        }

        @media (max-width: 700px) {
            header.hero-section { padding-top: 100px; }
            .node-row { flex-direction: column; text-align: center; gap: 15px; }
            .node-row:hover { transform: translateY(-5px); } 
            .node-desc { text-align: center; }
        }
    </style>
</head>
<body>

<nav class="nav-terminal">
    <a href="index.html" class="header-brand-link">
        <img src="theta_horizontal_transparent.png" alt="THETA AUDIO RESEARCH">
    </a>
    <div class="nav-links">
        <a href="store.html">STORE</a>
        <a href="support.html">SUPPORT</a>
    </div>
</nav>

<header class="hero-section">
    <div class="hero-logo-container">
        <img src="theta_primary_transparent.png" alt="THETA Laboratory Index">
    </div>
</header>

<main>
    <a href="arecibo.html" class="node-row">
        <span class="node-id">001_ISR</span>
        <span class="node-name">ARECIBO</span>
        <span class="node-desc">Interstellar Granular Processor</span>
    </a>
    <a href="atria.html" class="node-row">
        <span class="node-id">002_ARC</span>
        <span class="node-name">ATRIA</span>
        <span class="node-desc">Sonic Exploration Instrument</span>
    </a>
    <a href="cathode.html" class="node-row">
        <span class="node-id">003_VTR</span>
        <span class="node-name">CATHODE</span>
        <span class="node-desc">Character & Degradation Engine</span>
    </a>
    <a href="erosion.html" class="node-row">
        <span class="node-id">004_DEG</span>
        <span class="node-name">EROSION</span>
        <span class="node-desc">Four-Stage Saturation Engine</span>
    </a>
    <a href="twilight.html" class="node-row">
        <span class="node-id">005_GEN</span>
        <span class="node-name">TWILIGHT</span>
        <span class="node-desc">Regenerative Ambience Engine</span>
    </a>
</main>

<footer>
    <span>SYSTEM_STABLE // 2026</span>
    <span>LABORATORY_ACCESS_GRANTED</span>
</footer>

</body>
</html>
