<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THETA | Laboratory Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --void: #06080C; --gold: #C8A86B; --silver: #B0B0B0; --border: #1A1B23; }
        body { background-color: var(--void); color: var(--silver); font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* HEADER: THETA NORTH STAR */
        header { padding: 60px; display: flex; justify-content: space-between; align-items: flex-start; }
        .brand-block { display: flex; align-items: center; gap: 30px; }
        .main-logo { width: 80px; height: auto; opacity: 0.9; }
        .brand-text h1 { font-family: 'Montserrat'; font-size: 32px; letter-spacing: 24px; margin: 0; color: #fff; text-transform: uppercase; }
        .brand-text p { font-size: 10px; letter-spacing: 6px; color: var(--gold); margin: 8px 0 0 0; text-transform: uppercase; opacity: 0.7; }

        nav a { color: var(--gold); text-decoration: none; font-size: 10px; letter-spacing: 4px; font-weight: 700; border: 1px solid var(--border); padding: 12px 24px; transition: 0.3s; }
        nav a:hover { background: var(--gold); color: var(--void); }

        /* THE NODES: VERTICAL LIST WITH HIGH-CONTRAST DATA */
        main { flex: 1; padding: 0 60px; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
        
        .node-row { 
            display: flex; align-items: baseline; text-decoration: none; color: inherit; 
            padding: 20px 0; border-bottom: 1px solid rgba(26, 27, 35, 0.5); transition: 0.4s;
        }
        .node-row:hover { padding-left: 20px; border-bottom: 1px solid var(--gold); }
        
        .node-id { font-size: 10px; color: var(--gold); width: 80px; font-weight: 700; opacity: 0.5; }
        .node-name { font-family: 'Montserrat'; font-size: 48px; letter-spacing: 12px; color: #fff; text-transform: uppercase; margin-right: 40px; }
        .node-desc { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.4; }
        
        .node-row:hover .node-name { color: var(--gold); }
        .node-row:hover .node-desc { opacity: 1; color: #fff; }

        /* FOOTER STATUS */
        footer { padding: 40px 60px; font-size: 9px; letter-spacing: 6px; opacity: 0.3; display: flex; justify-content: space-between; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div class="brand-block">
        <img src="JUST THE LOGO .png" alt="THETA" class="main-logo">
        <div class="brand-text">
            <h1>THETA</h1>
            <p>Audio Research & Development</p>
        </div>
    </div>
    <nav>
        <a href="support.html">SUPPORT_CONTACT</a>
    </nav>
</header>

<main>
    <a href="atria.html" class="node-row">
        <span class="node-id">001_ARC</span>
        <span class="node-name">ATRIA</span>
        <span class="node-desc">Sonic Exploration Engine</span>
    </a>
    <a href="twilight.html" class="node-row">
        <span class="node-id">002_GEN</span>
        <span class="node-name">TWILIGHT</span>
        <span class="node-desc">Ambience Generator</span>
    </a>
    <a href="erosion.html" class="node-row">
        <span class="node-id">003_DEG</span>
        <span class="node-name">EROSION</span>
        <span class="node-desc">Digital Degeneration Engine</span>
    </a>
    <a href="cathode.html" class="node-row">
        <span class="node-id">004_VTR</span>
        <span class="node-name">CATHODE</span>
        <span class="node-desc">Analog Degradation & Drift</span>
    </a>
</main>

<footer>
    <span>LAB NOTE #001 // SYSTEM STABLE</span>
    <span>TERMINAL ACCESS // 2026</span>
</footer>

</body>
</html>
