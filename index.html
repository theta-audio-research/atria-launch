<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THETA AUDIO RESEARCH | Laboratory Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #06080C;
            --gold: #C8A86B;
            --border: #121320;
            --silver: #B0B0B0;
        }

        body {
            background-color: var(--void);
            color: var(--silver);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 40px 60px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo-svg {
            width: 50px;
            height: 50px;
            margin-right: 30px;
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 38px;
            letter-spacing: 28px;
            text-transform: uppercase;
        }

        /* --- MAIN HUB --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .lab-gate {
            text-decoration: none;
            color: var(--gold);
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            letter-spacing: 8px;
            padding: 20px 40px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .lab-gate:hover {
            background: var(--gold);
            color: var(--void);
            box-shadow: 0 0 30px rgba(200, 168, 107, 0.3);
        }

        /* --- FOOTER (FIXED SUPPORT LINK) --- */
        footer {
            padding: 40px 60px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            letter-spacing: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .support-link {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .support-link:hover {
            border-bottom: 1px solid var(--gold);
            opacity: 1;
        }

        .institutional-note {
            opacity: 0.4;
        }
    </style>
</head>
<body>

<nav>
    <svg class="logo-svg" viewBox="0 0 100 100">
        <path d="M50 15 L85 85 L15 85 Z" fill="none" stroke="#C8A86B" stroke-width="4"/>
        <path d="M42 35 L15 85 L85 85 L58 35" fill="#06080C"/>
        <rect x="15" y="58" width="70" height="10" fill="#C8A86B"/>
    </svg>
    <div class="brand-title">THETA</div>
</nav>

<main>
    <a href="cathode.html" class="lab-gate">ENTER CATHODE</a>
    <a href="atria.html" class="lab-gate">ENTER ATRIA</a>
    <a href="twilight.html" class="lab-gate">ENTER TWILIGHT</a>
</main>

<footer>
    <div class="institutional-note">LAB NOTE #001 // SYSTEM STABLE</div>
    <div><a href="support.html" class="support-link">ACCESS SUPPORT TERMINAL</a></div>
</footer>

</body>
</html>
