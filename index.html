<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THETA Audio Research | Institutional Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --void: #040406; --twilight: #0D0E20; --gold: #C8A86B; --text: #E0E0E0; --border: #1A1B23; }
        html { scroll-behavior: smooth; }
        @keyframes thetaBreath { 0% { background-color: var(--void); } 50% { background-color: var(--twilight); } 100% { background-color: var(--void); } }
        body { background-color: var(--void); color: var(--text); font-family: 'JetBrains Mono', monospace; margin: 0; line-height: 1.6; animation: thetaBreath 10s infinite ease-in-out; overflow-x: hidden; }
        nav { padding: 40px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(4, 4, 6, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .logo-group { display: flex; align-items: center; gap: 20px; }
        .logo-text { font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: 6px; font-size: 19px; color: #fff; margin: 0; text-transform: uppercase; }
        .logo-sub { font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 9px; letter-spacing: 4px; color: var(--gold); margin-top: -3px; text-transform: uppercase; opacity: 0.8; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--gold); text-decoration: none; font-size: 10px; opacity: 0.4; letter-spacing: 3px; font-family: 'Montserrat'; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; }
        .hero { padding: 150px 10% 100px 10%; text-align: center; border-bottom: 1px solid var(--border); }
        .hero h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(32px, 7vw, 60px); margin: 0; letter-spacing: 18px; font-weight: 700; text-transform: uppercase; text-indent: 18px; color: #fff; }
        .hero p { opacity: 0.5; max-width: 800px; margin: 40px auto; font-size: 14px; letter-spacing: 1px; line-height: 2; }
        .study-section { padding: 120px 10%; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); }
        .study-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
        .study-title { font-family: 'Montserrat', sans-serif; color: var(--gold); font-size: 11px; letter-spacing: 6px; margin-bottom: 25px; font-weight: 700; }
        #wave-container { border: 1px solid var(--border); height: 300px; background: rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .engine-select { padding: 100px 10%; text-align: center; }
        .engine-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 50px; }
        .engine-card { border: 1px solid var(--border); padding: 50px; background: rgba(255,255,255,0.02); text-decoration: none; color: inherit; transition: 0.4s; }
        .engine-card:hover { border-color: var(--gold); background: rgba(200, 168, 107, 0.05); transform: translateY(-5px); }
        .engine-card h4 { font-family: 'Montserrat'; font-size: 24px; letter-spacing: 8px; text-transform: uppercase; color: #fff; margin: 0 0 10px 0; }
        .engine-card p { font-size: 10px; opacity: 0.4; letter-spacing: 3px; text-transform: uppercase; }
        footer { padding: 100px 5%; font-size: 9px; opacity: 0.3; letter-spacing: 3px; text-align: center; border-top: 1px solid var(--border); }
    </style>
</head>
