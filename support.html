<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPPORT | THETA Audio Research</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --void: #040406; --twilight: #0D0E20; --gold: #C8A86B; --text: #E0E0E0; --border: #1A1B23; }
        body { background-color: var(--void); color: var(--text); font-family: 'JetBrains Mono', monospace; margin: 0; line-height: 1.6; }
        nav { padding: 40px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-group { display: flex; align-items: center; gap: 20px; text-decoration: none; }
        .logo-text { font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: 6px; font-size: 19px; color: #fff; margin: 0; text-transform: uppercase; }
        nav a { color: var(--gold); text-decoration: none; font-size: 10px; opacity: 0.4; letter-spacing: 3px; font-family: 'Montserrat'; }
        .support-container { max-width: 800px; margin: 100px auto; padding: 0 20px; }
        .support-header { margin-bottom: 60px; border-left: 3px solid var(--gold); padding-left: 30px; }
        .support-header h1 { font-family: 'Montserrat'; font-size: 32px; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        .faq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 80px; }
        .faq-item { border: 1px solid var(--border); padding: 30px; background: rgba(255,255,255,0.02); }
        .faq-item h4 { font-family: 'Montserrat'; font-size: 11px; color: var(--gold); letter-spacing: 2px; margin: 0 0 15px 0; text-transform: uppercase; }
        .distress-form { border: 1px solid var(--border); padding: 50px; background: rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 30px; }
        label { display: block; font-size: 10px; color: var(--gold); letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; font-family: 'JetBrains Mono'; font-size: 13px; box-sizing: border-box; }
        .submit-btn { font-family: 'Montserrat', sans-serif; background: var(--gold); color: #000; border: none; padding: 20px 40px; cursor: pointer; font-size: 12px; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; width: 100%; transition: 0.3s; }
        footer { padding: 100px 5%; font-size: 9px; opacity: 0.3; letter-spacing: 3px; text-align: center; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo-group">
            <svg width="40" height="40" viewBox="0 0 100 100">
                <path d="M50 15 L85 85 L15 85 Z" fill="none" stroke="#C8A86B" stroke-width="4"/>
                <rect x="15" y="58" width="70" height="10" fill="#C8A86B"/>
            </svg>
            <h2 class="logo-text">THETA</h2>
        </a>
        <div style="display: flex; gap: 30px;">
            <a href="atria.html">ATRIA ENGINE</a>
            <a href="index.html">RETURN TO LAB</a>
        </div>
    </nav>
    <div class="support-container">
        <header class="support-header">
            <h1>Signal Support</h1>
            <p style="opacity:0.5; font-size:13px;">Transmission routing: lofiluxury66@gmail.com</p>
        </header>
        <form action="https://formspree.io/f/lofiluxury66@gmail.com" method="POST" class="distress-form">
            <div class="form-group">
                <label>Researcher Name / Email</label>
                <input type="email" name="email" placeholder="researcher@institute.io" required>
            </div>
            <div class="form-group">
                <label>Signal Environment (OS / DAW)</label>
                <input type="text" name="environment" placeholder="e.g. macOS 14 / Ableton 12" required>
            </div>
            <div class="form-group">
                <label>Nature of Distress</label>
                <select name="type">
                    <option>UI Scaling / Graphics Error</option>
                    <option>Audio Engine Crash</option>
                    <option>License Validation Failure</option>
                </select>
            </div>
            <div class="form-group">
                <label>Detailed Observations</label>
                <textarea name="message" rows="5" placeholder="Describe the artifact..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Transmit Distress Signal</button>
        </form>
    </div>
    <footer>© 2026 THETA AUDIO RESEARCH. TECHNICAL RECOVERY PORTAL.</footer>
</body>
</html>
