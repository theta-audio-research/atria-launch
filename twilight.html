<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWILIGHT | THETA Audio Research</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --void: #020204; --gold: #C8A86B; --text: #E0E0E0; --border: #121320; }
        body { background-color: var(--void); color: var(--text); font-family: 'JetBrains Mono', monospace; margin: 0; line-height: 1.6; }
        nav { padding: 40px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(2, 2, 4, 0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        .logo-group { display: flex; align-items: center; gap: 20px; text-decoration: none; }
        .logo-text { font-family: 'Montserrat', sans-serif; font-weight: 700; letter-spacing: 6px; font-size: 19px; color: #fff; margin: 0; text-transform: uppercase; }
        .logo-sub { font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 9px; letter-spacing: 4px; color: var(--gold); margin-top: -3px; text-transform: uppercase; opacity: 0.8; }
        .hero { padding: 150px 10% 100px 10%; text-align: center; }
        .hero h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(42px, 10vw, 80px); margin: 0; letter-spacing: 24px; font-weight: 700; text-transform: uppercase; text-indent: 24px; color: #fff; }
        .hero .sub-brand { font-family: 'Montserrat', sans-serif; color: var(--gold); font-size: 12px; letter-spacing: 12px; text-transform: uppercase; margin-top: 10px; font-weight: 400; opacity: 0.9; }
        #twilight-wave { border: 1px solid var(--border); height: 400px; background: rgba(0,0,0,0.4); position: relative; overflow: hidden; margin: 60px 0; }
        canvas { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .quote-section { padding: 100px 20%; text-align: center; border-top: 1px solid var(--border); }
        .quote-text { font-size: 22px; line-height: 1.8; color: #fff; font-style: italic; opacity: 0.9; }
        footer { padding: 100px 5%; font-size: 9px; opacity: 0.2; letter-spacing: 4px; text-align: center; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo-group">
            <svg width="50" height="50" viewBox="0 0 100 100">
                <defs><filter id="glow"><feGaussianBlur stdDeviation="2.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                <path d="M50 15 L85 85 L15 85 Z" fill="none" stroke="#C8A86B" stroke-width="3.5" filter="url(#glow)"/>
                <path d="M42 35 L15 85 L85 85 L58 35" fill="none" stroke="#040406" stroke-width="6"/>
                <rect x="15" y="58" width="70" height="10" fill="#C8A86B" filter="url(#glow)"/>
            </svg>
            <div><h2 class="logo-text">THETA</h2><p class="logo-sub">AUDIO RESEARCH</p></div>
        </a>
        <div style="display: flex; gap: 30px;"><a href="atria.html">ATRIA</a><a href="index.html">RETURN TO LAB</a></div>
    </nav>
    <div class="hero">
        <h1>TWILIGHT</h1>
        <div class="sub-brand">Ambience Generator</div>
        <div id="twilight-wave"><canvas id="hypnoWave"></canvas></div>
        <button style="font-family: 'Montserrat', sans-serif; background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 24px 70px; cursor: pointer; font-size: 14px; letter-spacing: 5px; text-transform: uppercase;">Register for Beta</button>
    </div>
    <section class="quote-section"><p class="quote-text">"I built TWILIGHT because I wanted a tool that lived in that moment just before sleep—that drifting where the mind starts inventing reality."</p></section>
    <footer>© 2026 THETA AUDIO RESEARCH. TWILIGHT DIVISION.</footer>
    <script>
        const canvas = document.getElementById('hypnoWave');
        const ctx = canvas.getContext('2d');
        let width, height, offset = 0;
        function resize() { width = canvas.width = canvas.offsetWidth; height = canvas.height = canvas.offsetHeight; }
        window.addEventListener('resize', resize); resize();
        function draw() {
            ctx.clearRect(0, 0, width, height); ctx.beginPath(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.globalAlpha = 0.15;
            for (let x = 0; x < width; x++) {
                const y = height / 2 + Math.sin(x * 0.005 + offset) * 60 + Math.sin(x * 0.01 + offset * 0.8) * 30;
                if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke(); offset += 0.015; requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
